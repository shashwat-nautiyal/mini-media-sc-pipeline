networks:
  media-pipeline:
    driver: bridge

volumes:
  postgres_data:
  kafka_data:
  zookeeper_data:

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_DB: temporal
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [media-pipeline]

  temporal:
    image: temporalio/auto-setup:1.22.0
    ports:
      - "7233:7233" # gRPC port
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=db
    depends_on: [db]
    networks: [media-pipeline]
  
  temporal-ui:
    image: temporalio/ui:latest
    container_name: mini-mediascpipleline-temporal-ui-1
    depends_on:
      - temporal
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    ports:
      - "8080:8080"          # This will serve the Web UI
    networks:
      - media-pipeline

  zookeeper:
        image: confluentinc/cp-zookeeper:7.5.0
        environment:
          ZOOKEEPER_CLIENT_PORT: 2181
        volumes:
        - zookeeper_data:/var/lib/zookeeper/data
        - zookeeper_data:/var/lib/zookeeper/log
        networks: [media-pipeline]

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks: [media-pipeline]

  localstack:
    image: localstack/localstack:4.12.0          # ← Stable community version
    container_name: mini-mediascpipleline-localstack-1
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEBUG=1
      - DEFAULT_REGION=us-east-1
      - ACTIVATE_PRO=0
    networks:
      - media-pipeline
      
  api-ruby:
    build: ./api-ruby
    ports:
      - "4567:4567"
    environment:
      - PORT=4567
      - KAFKA_BROKERS=kafka:29092
      - S3_ENDPOINT=http://localstack:4566
      - S3_BUCKET=media-pipeline-assets
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - AWS_REGION=us-east-1
    depends_on:
      - kafka
      - localstack
    restart: on-failure # CRITICAL: Ruby boots faster than Kafka. This forces a retry
    networks:
      - media-pipeline

  worker-go:
    build: ./worker-go
    environment:
      - KAFKA_BROKERS=kafka:29092
      - TEMPORAL_HOST_PORT=temporal:7233
    depends_on:
      - kafka
      - temporal
    restart: on-failure
    networks:
      - media-pipeline